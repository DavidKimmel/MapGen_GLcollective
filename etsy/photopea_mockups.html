<!DOCTYPE html>
<html>
<head>
<title>GeoLine — Mockup Generator</title>
<style>
  body { font-family: sans-serif; margin: 20px; background: #1a1a1a; color: #eee; }
  h1 { font-size: 1.4em; }
  button { padding: 10px 20px; margin: 4px; cursor: pointer; font-size: 14px;
           background: #4a9; color: #fff; border: none; border-radius: 4px; }
  button:disabled { background: #555; cursor: not-allowed; }
  #log { margin: 16px 0; padding: 12px; background: #222; border-radius: 6px;
         max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px;
         white-space: pre-wrap; }
  .ok { color: #6c6; } .err { color: #c66; } .info { color: #6bf; }
  #pp { width: 100%; height: 450px; border: 1px solid #444; margin-top: 12px; }
  label { display: block; margin: 10px 0; }
  #progress { font-size: 18px; font-weight: bold; margin: 12px 0; }
  .step { color: #999; margin: 4px 0; }
</style>
</head>
<body>

<h1>GeoLine — PSD Mockup Generator (Photopea)</h1>

<div>
  <label>1. Select PSD mockup template(s):
    <input type="file" id="psdFiles" accept=".psd" multiple>
  </label>
  <label>2. Select poster image(s):
    <input type="file" id="posterFiles" accept=".png,.jpg,.jpeg" multiple>
  </label>
  <label><input type="checkbox" id="stretchFit"> Stretch to fill (uncheck to preserve aspect ratio)</label>
  <button id="btnGo" onclick="run()">3. Generate Mockups</button>
</div>

<div id="progress"></div>
<div id="log"></div>

<iframe id="pp" src="https://www.photopea.com"></iframe>

<script>
const ppFrame = document.getElementById("pp");
const logEl = document.getElementById("log");
const progEl = document.getElementById("progress");

function log(msg, cls) {
  const s = document.createElement("span");
  s.className = cls || "";
  s.textContent = msg + "\n";
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}

/* ---- Core: send one thing, wait for "done" ---- */
function ppSend(msg) {
  return new Promise(resolve => {
    function onMsg(e) {
      if (e.source !== ppFrame.contentWindow) return;
      if (e.data === "done") {
        window.removeEventListener("message", onMsg);
        resolve(null);
      }
    }
    window.addEventListener("message", onMsg);
    ppFrame.contentWindow.postMessage(msg, "*");
  });
}

/* Send script, but capture an ArrayBuffer that arrives BEFORE "done" */
function ppSendAndCapture(msg) {
  return new Promise(resolve => {
    let captured = null;
    function onMsg(e) {
      if (e.source !== ppFrame.contentWindow) return;
      if (e.data instanceof ArrayBuffer) {
        captured = e.data;
      }
      if (e.data === "done") {
        window.removeEventListener("message", onMsg);
        resolve(captured);
      }
    }
    window.addEventListener("message", onMsg);
    ppFrame.contentWindow.postMessage(msg, "*");
  });
}

function readFile(file) {
  return new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsArrayBuffer(file); });
}

function download(data, name) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([data], {type:"image/png"}));
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function run() {
  const psdFiles = Array.from(document.getElementById("psdFiles").files);
  const posterFiles = Array.from(document.getElementById("posterFiles").files);
  const stretch = document.getElementById("stretchFit").checked;

  if (!psdFiles.length || !posterFiles.length) { alert("Select PSD(s) and poster(s)"); return; }

  document.getElementById("btnGo").disabled = true;
  logEl.innerHTML = "";
  const total = psdFiles.length * posterFiles.length;
  let n = 0;

  log(`Batch: ${psdFiles.length} templates × ${posterFiles.length} posters = ${total} mockups\n`, "info");

  for (const psdFile of psdFiles) {
    const psdName = psdFile.name.replace(".psd", "");
    const psdBuf = await readFile(psdFile);

    for (const posterFile of posterFiles) {
      const posterName = posterFile.name.replace(/\.(png|jpe?g)$/i, "");
      n++;
      progEl.textContent = `[${n}/${total}] ${posterName} → ${psdName}`;
      log(`[${n}/${total}] ${posterName} + ${psdName}`, "info");

      try {
        // 1. Open the PSD template
        log("  Loading PSD...", "step");
        await ppSend(psdBuf);
        await sleep(400);

        // 2. Select the smart object layer
        log("  Selecting smart object layer...", "step");
        await ppSend(`
          var doc = app.activeDocument;
          for (var i = 0; i < doc.layers.length; i++) {
            if (doc.layers[i].name === "your design here") {
              doc.activeLayer = doc.layers[i];
              break;
            }
          }
        `);

        // 3. Open the smart object for editing
        log("  Opening smart object...", "step");
        await ppSend(`
          executeAction(stringIDToTypeID("placedLayerEditContents"), undefined, DialogModes.NO);
        `);
        await sleep(300);

        // 4. We're now inside the smart object doc. Select all + delete existing content.
        log("  Clearing smart object...", "step");
        await ppSend(`
          var soDoc = app.activeDocument;
          soDoc.selection.selectAll();
          soDoc.selection.clear();
          soDoc.selection.deselect();
        `);

        // 5. Load the poster as a new file
        log("  Loading poster...", "step");
        const posterBuf = await readFile(posterFile);
        await ppSend(posterBuf);
        await sleep(300);

        // 6. Select all + copy from poster, then close it
        log("  Copying poster...", "step");
        await ppSend(`
          var posterDoc = app.activeDocument;
          posterDoc.selection.selectAll();
          posterDoc.activeLayer.copy();
          posterDoc.close(SaveOptions.DONOTSAVECHANGES);
        `);
        await sleep(200);

        // 7. Now back in the smart object — paste and resize
        log("  Pasting into smart object...", "step");
        var resizeScript = stretch ? `
          // Stretch to fill entire smart object
          var soDoc = app.activeDocument;
          var pasted = soDoc.paste();
          pasted = soDoc.activeLayer;
          var docW = soDoc.width.as("px");
          var docH = soDoc.height.as("px");
          var b = pasted.bounds;
          var lw = b[2].as("px") - b[0].as("px");
          var lh = b[3].as("px") - b[1].as("px");
          var sx = (docW / lw) * 100;
          var sy = (docH / lh) * 100;
          pasted.resize(sx, sy, AnchorPosition.MIDDLECENTER);
          var b2 = pasted.bounds;
          var dx = -b2[0].as("px");
          var dy = -b2[1].as("px");
          pasted.translate(new UnitValue(dx,"px"), new UnitValue(dy,"px"));
        ` : `
          // Contain: fit within smart object preserving aspect ratio
          var soDoc = app.activeDocument;
          var pasted = soDoc.paste();
          pasted = soDoc.activeLayer;
          var docW = soDoc.width.as("px");
          var docH = soDoc.height.as("px");
          var b = pasted.bounds;
          var lw = b[2].as("px") - b[0].as("px");
          var lh = b[3].as("px") - b[1].as("px");
          var scale = Math.min(docW / lw, docH / lh) * 100;
          pasted.resize(scale, scale, AnchorPosition.MIDDLECENTER);
          var b2 = pasted.bounds;
          var nw = b2[2].as("px") - b2[0].as("px");
          var nh = b2[3].as("px") - b2[1].as("px");
          var dx = (docW - nw) / 2 - b2[0].as("px");
          var dy = (docH - nh) / 2 - b2[1].as("px");
          pasted.translate(new UnitValue(dx,"px"), new UnitValue(dy,"px"));
        `;
        await ppSend(resizeScript);

        // 8. Save smart object and close it (returns to main PSD)
        log("  Saving smart object...", "step");
        await ppSend(`
          app.activeDocument.save();
          app.activeDocument.close(SaveOptions.DONOTSAVECHANGES);
        `);
        await sleep(500);

        // 9. Export the final mockup
        log("  Exporting PNG...", "step");
        var pngData = await ppSendAndCapture(
          'app.activeDocument.saveToOE("png");'
        );

        if (pngData) {
          var outName = posterName + "__" + psdName + ".png";
          download(pngData, outName);
          log("  ✓ Saved: " + outName + " (" + (pngData.byteLength/1024).toFixed(0) + " KB)\n", "ok");
        } else {
          log("  ✗ Export returned no data\n", "err");
        }

        // 10. Close the PSD
        await ppSend(`
          app.activeDocument.close(SaveOptions.DONOTSAVECHANGES);
        `);
        await sleep(200);

      } catch(err) {
        log("  ✗ FAILED: " + err.message + "\n", "err");
      }
    }
  }

  progEl.textContent = `Done! ${n} mockups generated.`;
  log(`\nComplete: ${n} mockups.`, "ok");
  document.getElementById("btnGo").disabled = false;
}
</script>

</body>
</html>
